name: Django CI Pipeline

on:
  push:
    branches:
      - develop

env:
  PYTHON_VERSION: "3.10"
  DB_NAME: dummy
  DB_USER: dummy_user
  DB_PASSWORD: dummy_password
  DB_HOST: db
  DJANGO_SETTINGS_MODULE: backend.config.settings
  DJANGO_SECRET_KEY: "dummy-secret-key"
  FRONTEND_URL: http://localhost:5173
  DEFAULT_FROM_EMAIL: noreply@localhost
  DB_PORT: 5432
  MONGO_HOST: dummy_mongo
  MONGO_PORT: 27017
  MONGO_DB_NAME: dummy_chat_db

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Pylint
        run: |
          export PYTHONPATH=$(pwd)
          score=$(pylint --rcfile=backend/.pylintrc backend/ | grep "Your code has been rated at" | awk '{print $7}' | cut -d/ -f1)

      - name: Check code formatting with Black
        run: black --check backend/

      - name: Check imports with Isort
        run: isort --check-only backend/

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ env.DB_NAME }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongo --eval 'db.adminCommand({ping:1})'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DJANGO_SETTINGS_MODULE: backend.config.settings
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379
      MONGO_URL: mongodb://localhost:27017/test_db
      DJANGO_SECRET_KEY: dummy-secret-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput
        working-directory: backend

      - name: Run tests
        run: python manage.py test
        working-directory: backend
