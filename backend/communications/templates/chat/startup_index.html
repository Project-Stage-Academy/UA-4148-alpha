<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Conversations</title>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.6"></script>
</head>
<body>

<div style="text-align: right; margin-bottom: 1rem;">
  <button id="logout-btn">Logout</button>
</div>

<div id="main-container">
  <h1>Your Conversations</h1>

  <ul>
    {% for room in rooms %}
    <li>
      {{ room.name }}
      <button
        hx-get="{% url 'room' room.id %}"
        hx-target="#main-container"
        hx-push-url="true"
        hx-swap="innerHTML">
        Open conversation
      </button>
    </li>
    {% endfor %}
  </ul>
</div>

<script>
  // Get CSRF token from cookie
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');
      for (let cookie of cookies) {
        cookie = cookie.trim();
        if (cookie.startsWith(name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    const refresh = localStorage.getItem('refresh');
    const access = localStorage.getItem('access');

    if (!refresh) {
      alert('No refresh token found. You may already be logged out.');
      window.location.href = '/login/';
      return;
    }

    try {
      const response = await fetch('/api/logout/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + access,
          'X-CSRFToken': getCookie('csrftoken'),
        },
        body: JSON.stringify({ refresh }),
        credentials: 'include',
      });

      if (response.ok) {
        localStorage.removeItem('access');
        localStorage.removeItem('refresh');
        window.location.href = '/login/';
      } else {
        const data = await response.json();
        alert('Logout failed: ' + (data.error || data.detail || 'Unknown error'));
      }
    } catch (err) {
      alert('Logout error: ' + err.message);
    }
  });
</script>

</body>
</html>
