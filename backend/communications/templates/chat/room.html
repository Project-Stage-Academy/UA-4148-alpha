<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Chat Room</title>
</head>
<body>
    <textarea id="chat-log" cols="100" rows="20"></textarea><br>
    <input id="chat-message-input" type="text" size="100" placeholder="Type a message..."><br>
    <input id="chat-message-submit" type="button" value="Send">

    {{ other_user_id|json_script:"other-user-id" }}
    {{ current_user_id|json_script:"current-user-id" }}

    <script>
        let currentUserId = null;
        let otherUserId = null;

        const otherUserIdEl = document.getElementById('other-user-id');
        const currentUserIdEl = document.getElementById('current-user-id');

        if (!otherUserIdEl || !currentUserIdEl) {
            console.error("User error: missing user elements in DOM.");
        } else {
            try {
                currentUserId = JSON.parse(currentUserIdEl.textContent);
                otherUserId = JSON.parse(currentUserIdEl.textContent);
            } catch (err) {
                console.error("Error parsing users IDs from JSON script tags:", err);
            }
        }

        const chatLog = document.querySelector('#chat-log');
        const messageInputDom = document.querySelector('#chat-message-input');
        const messageSubmitButton = document.querySelector('#chat-message-submit');

        let chatSocket = null;
        let reconnectDelay = 2000;

        function appendLog(text) {
            chatLog.value += text + '\n';
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function bindMessageEvents() {
            if (!messageInputDom || !messageSubmitButton) return;

            messageInputDom.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    messageSubmitButton.click();
                }
            });

            messageSubmitButton.onclick = function() {
                const message = messageInputDom.value.trim();
                if (!message || chatSocket.readyState !== WebSocket.OPEN) return;

                chatSocket.send(JSON.stringify({ message }));
                messageInputDom.value = '';
            };
        }

        function initChatSocket() {
            if (!otherUserId || !currentUserId) {
                alert("Missing user information for chat.");
                return;
            }

            const socketUrl = `ws://${window.location.host}/ws/chat/${otherUserId}/?user=${currentUserId}`;
            chatSocket = new WebSocket(socketUrl);

            chatSocket.onopen = () => {
                reconnectDelay = 2000;
                console.log("Connected to chat server");
                appendLog("[Connected to chat]");
                messageSubmitButton.disabled = false;
                bindMessageEvents();
            };

            chatSocket.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);

                    if (data.type === "history" && Array.isArray(data.messages)) {
                        data.messages.forEach(msg => {
                            const name = `${msg.sender_first_name} ${msg.sender_last_name}`;
                            appendLog(`${name}: ${msg.text}    ${msg.timestamp}`);
                        });
                    }

                    if (data.type === "message" && data.message) {
                        const name = `${data.sender_first_name} ${data.sender_last_name}`;
                        appendLog(`${name}: ${data.message}    ${data.timestamp}`);
                    }

                } catch (err) {
                    console.error("Error parsing incoming WebSocket message:", err);
                }
            };

            chatSocket.onclose = () => {
                messageSubmitButton.disabled = true;
                console.warn(`Chat socket closed unexpectedly, reconnecting in ${reconnectDelay / 1000}s...`);
                appendLog(`[Disconnected, retrying in ${reconnectDelay / 1000} seconds...]`);
                setTimeout(() => {
                    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
                    initChatSocket();
                }, reconnectDelay);
            };

            chatSocket.onerror = (e) => {
                console.error("WebSocket error", e);
                chatSocket.close();
            };
        }
        initChatSocket();
    </script>
</body>
</html>
