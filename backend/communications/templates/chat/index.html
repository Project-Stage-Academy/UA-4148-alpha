<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Start a Chat</title>
</head>
<body>
    <h2>Select a startup to chat with:</h2>
    <ul id="users-list"></ul>

    <p id="no-users" style="display: none;">
        No users to start a chat with.
    </p>

    <script>
        async function authFetch(url, options = {}) {
            let token = localStorage.getItem("access_token");
            const refresh = localStorage.getItem("refresh_token");

            if (!token || !refresh) {
                throw new Error("Authentication tokens missing. Please login.");
            }

            options.headers = options.headers || {};
            options.headers["Authorization"] = `Bearer ${token}`;

            let response = await fetch(url, options);

            if (response.status === 401) {
                const refreshRes = await fetch("/api/token/refresh/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ refresh })
                });

                if (!refreshRes.ok) {
                    throw new Error("Token refresh failed");
                }

                const data = await refreshRes.json();
                token = data.access;
                localStorage.setItem("access_token", token);

                options.headers["Authorization"] = `Bearer ${token}`;
                response = await fetch(url, options);
            }

            return response;
        }

        async function loadUsers() {
            try {
                const meRes = await authFetch("/api/users/me/");
                if (!meRes.ok) throw new Error("User check failed");
                const me = await meRes.json();

                const list = document.getElementById("users-list");
                const noUsers = document.getElementById("no-users");
                let users = [];

                if (me.role === "investor") {
                    const resp = await authFetch("/api/users/by-role/?role=startup");
                    users = await resp.json();
                } else if (me.role === "startup") {
                    const resp = await authFetch("/api/chat/rooms/");
                    const rooms = await resp.json();
                    users = rooms.map(room => {
                        return room.participants.find(p => p.id !== me.id);
                    }).filter(Boolean);
                }

                if (!users || users.length === 0) {
                    noUsers.style.display = "block";
                    return;
                }

                users.forEach(user => {
                    const li = document.createElement("li");
                    li.textContent = `${user.first_name} ${user.last_name} (${user.email})`;

                    const btn = document.createElement("button");
                    btn.textContent = "Chat";
                    btn.onclick = () => startChat(user.id);

                    li.appendChild(btn);
                    list.appendChild(li);
                });

            } catch (err) {
                console.error("Error loading users:", err);
                const noUsers = document.getElementById("no-users");
                noUsers.innerText = "Error loading users.";
                noUsers.style.display = "block";
            }
        }

        function startChat(other_user_id) {
            window.location.href = `/chat/room/${other_user_id}/`;
        }

        loadUsers();
    </script>
</body>
</html>
