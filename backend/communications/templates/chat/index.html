<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Start a Chat</title>
</head>
<body>
    <h2>Select a user to chat with:</h2>

    <ul>
        {% for user in users %}
            {% if user.id != current_user_id %}
                <li>
                    {{ user.first_name }} {{ user.last_name }} ({{ user.email }})
                    <button onclick="startChat({{ current_user_id }}, {{ user.id }})">Chat</button>
                </li>
            {% endif %}
        {% endfor %}
    </ul>

    <script>
        function startChat(currentUserId, otherUserId) {
            const roomUrl = `/chat/room/${otherUserId}/?user=${currentUserId}`;
            window.location.href = roomUrl;
        }
    </script>
</body>
</html>
