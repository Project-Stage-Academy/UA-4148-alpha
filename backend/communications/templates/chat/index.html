<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Chat Rooms</title>
</head>
<body>
    <p>What chat room would you like to enter?</p>
    <form id="room-form">
        <input id="room-name-input" type="text" size="100" placeholder="Enter room name">
        <button id="room-name-submit" type="submit">Enter</button>
    </form>

    <script>
        const roomNameInput = document.querySelector('#room-name-input');
        const roomForm = document.querySelector('#room-form');

        if (!roomNameInput || !roomForm) {
            console.error("Required elements not found.");
        } else {
            roomNameInput.focus();

            roomForm.addEventListener('submit', function (e) {
                e.preventDefault();

                const roomName = roomNameInput.value.trim();
                if (!roomName) {
                    alert('Please enter a room name.');
                    return;
                }

                window.location.pathname = '/chat/' + encodeURIComponent(roomName) + '/';
            });
        }
    </script>
</body>
</html>
